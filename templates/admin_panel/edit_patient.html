{% extends 'core/base.html' %}
{% block title %}Admin - Edit Patient{% endblock %}
{% block content %}
<div class="page-wrapper narrow">
  <div class="page-header">
    <h1>Edit Patient</h1>
    <p>Update profile details for {{ patient.user.get_full_name|default:patient.user.username }}.</p>
  </div>

  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group" style="flex:1;">
          <label class="form-label">First Name</label>
          <input name="first_name" class="form-input" value="{{ patient.user.first_name }}" />
        </div>
        <div class="form-group" style="flex:1;">
          <label class="form-label">Last Name</label>
          <input name="last_name" class="form-input" value="{{ patient.user.last_name }}" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-input" value="{{ patient.user.email }}" />
      </div>

      <div class="form-group">
        <label class="form-label">Profile</label>
        {{ form.as_p }}
      </div>

      <div style="display:flex;gap:12px;margin-top:14px;">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'admin_patients' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
