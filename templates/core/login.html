{% extends 'core/base.html' %}
{% block title %}Login — Health Passport{% endblock %}
{% block content %}
<div class="page-wrapper narrow">
  <div style="max-width:460px;margin:40px auto;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">🏥</div>
      <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.75rem;">Welcome Back</h1>
      <p class="text-muted mt-2">Sign in to your Health Passport account</p>
    </div>
    <div class="card">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="Enter username" required autofocus />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary w-full" style="margin-top:8px;padding:12px;">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:0.875rem;color:var(--hp-gray-500);">
        Don't have an account? <a href="{% url 'register_choice' %}" style="color:var(--hp-blue);font-weight:600;">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
